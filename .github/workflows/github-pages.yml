# Pubblica il sito statico su GitHub Pages (piano gratuito).
# Dopo il push: Impostazioni del repo → Pages → Source: GitHub Actions
name: Pubblica su GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Carica sito
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
